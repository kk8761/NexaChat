<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NexaChat — Connect instantly with friends and groups.">
  <title>NexaChat — Sign In</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-container">
      
      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">💬</div>
        <h1>NexaChat</h1>
        <p>Log in or sign up to get started.</p>
      </div>
      
      <!-- Auth Card -->
      <div class="auth-card">
        
        <!-- Tabs -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-tab="phone" role="tab" id="tab-phone">Phone</button>
          <button class="auth-tab" data-tab="google" role="tab" id="tab-google">Google</button>
        </div>
        
        <!-- ═══ PHONE AUTH ═══ -->
        <div class="auth-form" id="phone-auth">
          
          <!-- Step 1: Enter Phone -->
          <div class="auth-step active" id="phone-step-1">
            <div class="input-group">
              <label for="phone-input">Phone Number</label>
              <div class="input-wrapper">
                <span class="input-icon">📞</span>
                <input 
                  type="tel" 
                  id="phone-input" 
                  class="input-field" 
                  placeholder="(555) 000-0000"
                  autocomplete="tel"
                  maxlength="15"
                >
              </div>
            </div>
            
            <div class="input-group">
              <label for="name-input">Display Name</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input 
                  type="text" 
                  id="name-input" 
                  class="input-field" 
                  placeholder="What should we call you?"
                  maxlength="50"
                >
              </div>
            </div>
            
            <button class="btn-primary" id="send-otp-btn" type="button">
              Continue
            </button>
          </div>
          
          <!-- Step 2: Enter OTP -->
          <div class="auth-step" id="phone-step-2">
            
            <!-- Demo OTP Display -->
            <div class="demo-otp-display hidden" id="demo-otp-box">
              <div class="label">🧪 Demo Code</div>
              <div class="code" id="demo-otp-code">------</div>
            </div>
            
            <p class="otp-header">
              Enter the 6-digit code sent to <br><strong id="otp-phone-display"></strong>
            </p>
            
            <div class="otp-inputs" id="otp-inputs">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">
              <input type="text" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="5">
            </div>
            
            <button class="btn-primary" id="verify-otp-btn" type="button" disabled>
              Verify & Sign In
            </button>
            
            <div class="otp-timer">
              <span id="otp-timer-text">Resend OTP in <strong id="otp-countdown">60</strong>s</span>
              <button class="resend-btn hidden" id="resend-otp-btn">Resend OTP</button>
            </div>
            
            <button class="btn-ghost" id="back-to-phone" type="button" style="align-self: center; margin-top: 8px;">
              Change phone number
            </button>
          </div>
        </div>
        
        <!-- ═══ GOOGLE AUTH ═══ -->
        <div class="auth-form hidden" id="google-auth">
          <div class="google-btn-wrapper">
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px;">
              Fast and secure sign in with Google
            </p>
            
            <button class="google-btn" id="google-signin-btn" type="button">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              <span>Continue with Google</span>
            </button>
            
            <!-- Google One Tap container -->
            <div id="g_id_onload"
              data-client_id=""
              data-callback="handleGoogleCredential"
              data-auto_prompt="false"
              style="display:none;">
            </div>
          </div>
        </div>
        
      </div>
      
      <!-- Theme Toggle -->
      <button class="theme-toggle-fab" onclick="toggleTheme()" title="Toggle Theme">
        <span class="theme-toggle-icon">🌙</span>
      </button>
      
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
