<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NexaChat — Real-time messaging with your friends and groups.">
  <title>NexaChat — Chat</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/chat.css">
  
  <!-- Socket.IO Client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <div class="app-container" id="chat-page">
    
    <!-- ═══════════════════════════════════════════
         TOP STORIES BAR
         ═══════════════════════════════════════════ -->
    <header class="stories-bar" id="stories-bar">
      <!-- Stories will be populated dynamically via stories.js -->
      <div class="story-item" id="my-story-btn">
        <div class="story-avatar add-story">
          <span>+</span>
        </div>
        <span class="story-name">Your Story</span>
      </div>
    </header>

    <div class="main-split">
      <!-- ═══════════════════════════════════════════
           SIDEBAR
           ═══════════════════════════════════════════ -->
      <aside class="sidebar" id="sidebar">
        
        <!-- Sidebar Header -->
        <div class="sidebar-header">
          <div class="sidebar-header-top">
            <h2 class="sidebar-title">Chats</h2>
            <div class="sidebar-actions">
              <button class="sidebar-action-btn" id="new-chat-btn" title="New Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
              <button class="sidebar-action-btn" title="Options">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
              </button>
              <button class="sidebar-action-btn" onclick="toggleTheme()" title="Toggle Theme">
                <span class="theme-toggle-icon">🌙</span>
              </button>
            </div>
          </div>
          
          <div class="search-container">
            <span class="search-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input 
              type="text" 
              class="search-input" 
              id="search-rooms" 
              placeholder="Search chats..."
            >
          </div>

          <div class="filter-pills">
            <button class="pill active">All</button>
            <button class="pill">Groups</button>
            <button class="pill">Archive</button>
          </div>
        </div>
        
        <!-- Room List -->
        <div class="room-list" id="room-list">
          <div class="empty-rooms" id="empty-rooms">
            <div class="empty-rooms-icon">💬</div>
            <p>No conversations yet</p>
            <button class="btn-primary" id="start-chat-btn">Start Chatting</button>
          </div>
        </div>
        
        <!-- Profile Section -->
        <div class="sidebar-profile" id="sidebar-profile">
          <img class="sidebar-profile-avatar" id="profile-avatar" src="" alt="Profile">
          <div class="sidebar-profile-info">
            <div class="sidebar-profile-name" id="profile-name">Loading...</div>
          </div>
          <button class="logout-btn" id="logout-btn" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </aside>
      
      <!-- ═══════════════════════════════════════════
           CHAT AREA
           ═══════════════════════════════════════════ -->
      <main class="chat-area" id="chat-area">
        
        <!-- Welcome Screen (default) -->
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-icon">👋</div>
          <h2>Welcome to NexaChat</h2>
          <p>Select a conversation or start a new chat.</p>
          <button class="btn-primary" id="welcome-new-chat-btn">Start a New Chat</button>
        </div>
        
        <!-- Active Chat View -->
        <div class="hidden" id="active-chat">
          
          <!-- Chat Header -->
          <div class="chat-header">
            <div class="chat-header-left">
              <button class="mobile-back-btn" id="mobile-back-btn">←</button>
              <img class="chat-header-avatar" id="chat-avatar" src="" alt="Chat">
              <div class="chat-header-info">
                <div class="chat-header-name" id="chat-name">Chat Name</div>
                <div class="chat-header-status" id="chat-status">online</div>
              </div>
            </div>
            
            <div class="chat-header-actions">
              <button class="header-action-btn" title="Call">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              </button>
              <button class="header-action-btn" title="Video">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
              </button>
              <button class="header-action-btn primary-icon" title="Profile">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              </button>
              
              <select id="room-theme-selector" class="theme-selector glass">
                <option value="default">Default</option>
                <option value="neon-blue">Neon Blue</option>
                <option value="cyber-purple">Cyber Purple</option>
                <option value="matrix-green">Matrix Green</option>
              </select>
            </div>
          </div>
          
          <!-- Messages -->
          <div class="messages-container" id="messages-container">
            <!-- Messages will be populated dynamically -->
          </div>
          
          <!-- Scroll to Bottom -->
          <button class="scroll-bottom-btn" id="scroll-bottom-btn">↓</button>
          
          <!-- Typing Indicator -->
          <div class="typing-indicator" id="typing-indicator">
            <div class="typing-text" id="typing-text">typing...</div>
          </div>
          
          <!-- Message Input -->
          <div class="message-input-area">
            <div class="message-input-tools">
              <button class="tool-btn" title="Attachment">🔗</button>
              <button class="tool-btn" title="Image">🖼️</button>
              <button class="tool-btn" title="Gift">🎁</button>
            </div>
            
            <div class="message-input-container">
              <textarea 
                id="message-input" 
                placeholder="Type a message..." 
                rows="1"
                maxlength="5000"
              ></textarea>
            </div>
            
            <div class="message-input-post">
              <button class="emoji-btn" id="emoji-btn">☺️</button>
              <button class="mic-btn" id="send-btn" title="Voice / Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
              </button>
            </div>
          </div>
          
        </div>
      </main>
    </div>
  </div>
  
  <!-- ═══ NEW CHAT MODAL ═══ -->
  <div class="modal-overlay" id="new-chat-modal">
    <div class="modal">
      <h3>New Conversation</h3>
      <input 
        type="text" 
        class="modal-search" 
        id="user-search-input" 
        placeholder="Search by name, phone, or email..."
      >
      <div class="user-search-results" id="user-search-results">
        <div class="empty-rooms" style="padding: 2rem;">
          <p style="font-size: 0.85rem; color: #666;">Search for someone to start chatting</p>
        </div>
      </div>
      <button class="btn-secondary" id="close-modal-btn">Cancel</button>
    </div>
  </div>

  <!-- ═══ CREATE STORY MODAL ═══ -->
  <div class="modal-overlay" id="create-story-modal">
    <div class="modal story-create-modal">
      <div class="story-create-header">
        <h3>Create Story</h3>
        <button class="close-icon-btn" id="close-story-create-btn">✕</button>
      </div>
      <div class="story-preview-area" id="story-preview-area" style="background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);">
        <textarea 
          id="story-content-input" 
          class="story-textarea" 
          placeholder="Type your story..."
          maxlength="300"
        ></textarea>
      </div>
      
      <div class="color-presets">
        <button class="color-btn" data-color="linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%)" style="background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%)"></button>
        <button class="color-btn" data-color="linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)"></button>
        <button class="color-btn" data-color="linear-gradient(135deg, #bf00ff 0%, #00d4ff 100%)" style="background: linear-gradient(135deg, #bf00ff 0%, #00d4ff 100%)"></button>
        <button class="color-btn" data-color="linear-gradient(135deg, #00C9FF 0%, #92FE9D 100%)" style="background: linear-gradient(135deg, #00C9FF 0%, #92FE9D 100%)"></button>
        <button class="color-btn" data-color="linear-gradient(135deg, #111 0%, #333 100%)" style="background: linear-gradient(135deg, #111 0%, #333 100%)"></button>
      </div>
      
      <button class="btn-primary" id="publish-story-btn">Publish Story</button>
    </div>
  </div>

  <!-- ═══ STORY VIEWER MODAL ═══ -->
  <div class="story-viewer-overlay hidden" id="story-viewer-modal">
    <div class="story-viewer-container" id="story-viewer-container">
      <div class="story-progress-bar">
        <div class="story-progress-fill" id="story-progress-fill"></div>
      </div>
      
      <div class="story-viewer-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <img id="story-viewer-avatar" src="" alt="Avatar">
          <span id="story-viewer-name">Name</span>
          <span id="story-viewer-time">time</span>
        </div>
        <button class="close-icon-btn text-white" id="close-story-viewer-btn">✕</button>
      </div>
      
      <div class="story-viewer-content" id="story-viewer-content">
        Text Content
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/stories.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
